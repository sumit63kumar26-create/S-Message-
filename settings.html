<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
}

.header{
height:60px;
display:flex;
align-items:center;
padding:0 15px;
background:#1b1b1b;
border-bottom:1px solid #333;
}

.backBtn{
font-size:24px;
cursor:pointer;
margin-right:15px;
}

.title{
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{

background:#1e1e1e;
border-radius:12px;
padding:18px;
margin-bottom:15px;
cursor:pointer;
transition:.2s;

}

.card:active{

transform:scale(.98);

}

.cardTitle{

font-size:18px;

}

.logout{

margin-top:40px;
background:#c62828;
text-align:center;

}

.logout:active{

background:#b71c1c;

}

</style>

</head>

<body>

<div class="header">

<div class="backBtn"
id="backBtn">
←
</div>

<div class="title">
Settings
</div>

</div>

<div class="container">

<div class="card"
id="friendsCard">

<div class="cardTitle">
👥 Friends (<span id="friendsCount">0</span>)
</div>

</div>

<div class="card"
id="blockedCard">

<div class="cardTitle">
🚫 Blocked Users (<span id="blockedCount">0</span>)
</div>

</div>

<div class="card"
id="notificationCard">

<div class="cardTitle">
🔔 Notifications
</div>

</div>

<div class="card"
id="advancedCard">

<div class="cardTitle">
⚡ Advanced Features
</div>

</div>

<div class="card"
id="aboutCard">

<div class="cardTitle">
ℹ️ About
</div>

</div>

<div class="card logout"
id="logoutBtn">

<div class="cardTitle">

 Logout

</div>

</div>

</div>

<script type="module"
src="settings.js">
</script>

</body>
</html>
