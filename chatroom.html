<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S Chat</title>

    <link rel="stylesheet" href="chatroom.css">
    
<style>
  
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* Top Bar */

.topBar{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px;
    background:#1b1b1b;
    border-bottom:1px solid #333;
}

#backBtn{
    background:none;
    border:none;
    color:white;
    font-size:50px;
    cursor:pointer;
    margin-left: -6px;
    margin-top: -20px;
}

.userInfo{
    display:flex;
    align-items:center;
    gap:12px;
}

.profilePic{
    width:50px;
    height:50px;
    border-radius:50%;
    background:#00c853;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    color:white;
}

#friendName{
    font-size:18px;
    margin-bottom:3px;
}

#friendStatus{
    font-size:13px;
    color:#aaa;
}

/* Messages */

#chatMessages{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

/* Message Box */

.messageBox{
    display:flex;
    gap:10px;
    padding:12px;
    background:#1b1b1b;
    border-top:1px solid #333;
}

#messageInput{
    flex:1;
    padding:12px;
    border:none;
    outline:1px solid white;
    border-radius:25px;
    background:#222;
    color:white;
    font-size:15px;
    font-weight: bold;
}

#sendBtn{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:#45C5FF;
    color:white;
    font-size:20px;
    cursor:pointer;
}

#sendBtn:active{
    transform:scale(0.95);
}

.menuContainer {
    
    position: relative;
    margin-left: auto;
    
}

#menuBtn {
    
    background: none;
    border: none;
    color: white;
    font-size: 28px;
    cursor: pointer;
    
}

.popupMenu {
    
    display: none;
    
    position: absolute;
    right: 0;
    top: 40px;
    
    background: #1f1f1f;
    
    border-radius: 10px;
    
    min-width: 170px;
    
    overflow: hidden;
    
    box-shadow: 0 0 10px rgba(0, 0, 0, .4);
    
    z-index: 999;
    
}

.menuItem {
    
    padding: 14px;
    
    cursor: pointer;
    
    border-bottom: 1px solid #333;
    
}

.menuItem:last-child {
    
    border-bottom: none;
    
}

.menuItem:active {
    
    background: #333;
    
}

</style>
</head>
<body>

    <!-- Top Bar -->
    <header class="topBar">

        <button id="backBtn">←</button>

        <div class="userInfo">

            <div class="profilePic">
                👤
            </div>

            <div>

                <h3 id="friendName">
                    Loading...
                </h3>

                <p id="friendStatus">
                    Offline
                </p>
                
            </div>

        </div>
        
        <div class="menuContainer">

    <button id="menuBtn">
        ⋮
    </button>

    <div id="popupMenu" class="popupMenu">

        <div id="blockUserBtn" class="menuItem">
            🚫 Block User
        </div>

    </div>

</div>

    </header>

    <!-- Messages -->

    <div id="chatMessages">

        <!-- Messages yahan aayenge -->

    </div>

    <!-- Message Box -->

    <div class="messageBox">

        <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
        >

        <button id="sendBtn">
            ➤
        </button>

    </div>

    <script type="module" src="chatroom.js"></script>

</body>
</html>
