<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Advanced Features</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f172a;
color:white;

}

.topBar{

height:60px;
display:flex;
align-items:center;
padding:0 15px;
background:#111827;

}

#backBtn{

background:none;
border:none;
color:white;
font-size:22px;
margin-right:15px;

}

.title{

font-size:20px;
font-weight:bold;

}

.container{

padding:15px;

}

.card{

background:#1e293b;
border-radius:12px;
padding:18px;
margin-bottom:15px;

display:flex;
justify-content:space-between;
align-items:center;

}

.cardTitle{

font-size:17px;

}

.switch{

width:22px;
height:22px;

}

</style>

</head>

<body>

<div class="topBar">

<button id="backBtn">
←
</button>

<div class="title">

Advanced Features

</div>

</div>

<div class="container">

<div class="card">

<div class="cardTitle">

Search Bar

</div>

<input
type="checkbox"
id="searchToggle"
class="switch">

</div>

</div>

<script type="module"
src="advanced.js">
</script>

</body>
</html>
