<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S Chat - Home</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding-bottom:80px;
}

.container{
    padding:15px;
}

.search-box{
    display:flex;
    gap:10px;
}

.search-box input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#1e293b;
    color:white;
    font-weight:bold;
    border:1px solid#FFFFFF;
}

.search-box button{
    padding:12px 18px;
    border:none;
    border-radius:16px;
    background:#FFFFFF;
    color:black;
    font-weight:bold;
    border:2px solid#00C1FF8C;
}

.section{
    margin-top:25px;
}

.section h3{
    margin-bottom:10px;
}

.card{
    background:#1e293b;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

            /* Bottom Navigation */
            
            .bottomNav {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 65px;
                
                background: #1b1b1b;
                
                display: flex;
                justify-content: space-around;
                align-items: center;
                
                border-top: 1px solid #333;
            }
            
            .bottomNav button {
                
                background: none;
                border: none;
                color: white;
                
                font-size: 15px;
                cursor: pointer;
                
            }
            
            .bottomNav button:active {
                
                color: #00c853;
                
            }
            
            body {
                
                padding-bottom: 75px;
                
            }
#logoutBtn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#dc2626;
    color:white;
    margin-bottom:15px;
}

.appTitle{

    font-size:32px;

    font-weight:bold;

    text-align:center;

    margin-bottom:18px;

    color:white;

    letter-spacing:1px;
    
    background-color:#6DCEDD;
    
    width:335px;
    
    border:2px solid #DEE1E7;
    border-radius: 8px;

}

</style>
</head>
<body>

<div class="container">
    
    <div class="appTitle">

    S CHAT

</div>

    <!-- Search -->
    <div class="search-box">
    <input
        id="searchInput"
        type="text"
        placeholder="Search Username">

    <button id="searchBtn">
        Add
    </button>
</div>

    <!-- Search Results -->
    <div class="section">
    <h3>Search Results</h3>
    
    <div id="searchResults">
    </div>
</div>

    <!-- Requested -->
    <div class="section">

    <h3 id="requestCount">
        Requested - 0
    </h3>

    <div id="requestList">

        <div class="card">
            No Requests
        </div>

    </div>

</div>

</div>

    <div class="bottomNav">
        
        <button id="homeNav">Home</button>
        
        <button id="chatNav">Chats</button>
        
    </div>

<script type="module" src="home.js"></script>
</body>
</html>
